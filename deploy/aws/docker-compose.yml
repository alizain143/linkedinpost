services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linkedinpost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-linkedinpost}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Keep DB off the public internet — only reachable on the Docker network
    expose:
      - "5432"
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=50

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    expose:
      - "6379"

  api:
    build:
      context: ../..
      dockerfile: deploy/aws/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
